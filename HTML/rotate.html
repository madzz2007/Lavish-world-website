<!DOCTYPE html>
<html>
<head>
<style>
.rotate {
  width: 150px;
  height: 150px;
  background: green;
  animation: rotateBox 2s linear infinite;
}

@keyframes rotateBox {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}
</style>
</head>
<body>

<div class="rotate"></div>

</body>
</html>
